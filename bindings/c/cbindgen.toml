language = "C"
include_guard = "QUIPU_H"
pragma_once = false
tab_width = 4
cpp_compat = true
documentation = true
documentation_style = "c99"
no_includes = true
sys_includes = ["stdint.h", "stddef.h"]
autogen_warning = "/* Generated by cbindgen from quipu-capi. Do not edit by hand. Regenerate: cd bindings/c && cbindgen --config cbindgen.toml --crate quipu-capi --output include/quipu.h */"

[export]
# The status enum is not referenced by any signature (functions return int32_t),
# so force cbindgen to emit it — callers need QUIPU_OK / QUIPU_ERR_* constants.
include = ["quipu_status"]

[enum]
prefix_with_name = false
