# Cómo GitHub dibuja el botón "Sponsor" de Quipu.
#
# github: GitHub Sponsors. Vivo en https://github.com/sponsors/isazajuancarlos
#   La diligencia (identidad, pago, fiscal) es POR CUENTA, no por proyecto: ya
#   está hecha. Cualquier otro repo solo necesita un FUNDING.yml apuntando aquí.
#   Una organización sí sería una entidad patrocinable distinta, con su propia
#   inscripción.
#
# Open Collective: descartado. Open Source Collective rechazó el fiscal host
#   (proyecto demasiado temprano, sin suficientes colaboradores). Revisar si
#   algún día hay varios colaboradores o un patrocinador corporativo necesita
#   financiación facturada y transparente: ahí un fiscal host se gana su
#   sobrecoste.
#
# Buy Me a Coffee: retirado a propósito (estaba en #44). Un botón de propinas
#   junto a una biblioteca de criptografía post-cuántica que vende licencia
#   comercial y un SaaS dice "proyecto de fin de semana, un tipo solo", y socava
#   la seriedad que hace creíble cobrar la licencia. El comprador es una empresa;
#   la propina de tres euros no compensa la duda que planta en quien evalúa.
#
# Las donaciones son un complemento: el ingreso es la licencia comercial y el
# SaaS VOPRF. Se prefieren tiers de organización sobre tiers de propina.
github: [isazajuancarlos]
