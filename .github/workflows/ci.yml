name: CI

# Se activa cuando el proyecto pase a git/GitHub. Mientras tanto, el equivalente
# local es `scripts/audit.sh`.
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Auditoría semanal de dependencias aunque no haya cambios (nuevas CVEs).
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `--workspace` NO es decorativo. Sin él, y con un `[package]` en la raíz
      # del workspace, cargo prueba SOLO `quipu`: 137 pruebas de las 235 que
      # existen. Quedaban fuera los vectores RFC 9497 de `quipu-voprf`, el e2e
      # del servidor OPRF, el ABI de C y —desde que se extrajo el núcleo— los
      # bancos de glifos. Medido el 2026-07-21: el job pasó de 37 minutos a 4
      # al mudarse esas pruebas de crate, y el CI lo reportó como verde.
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Tests
        run: cargo test --workspace --all-targets
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      # `--all-targets` EXCLUYE los doctests, pese al nombre. Sin este paso, los
      # ejemplos de la documentación no se compilan nunca — documentación que no
      # se ejecuta es documentación que miente. Comprobado el 2026-07-21: el CI
      # llevaba desde siempre sin ejecutar uno solo.
      - name: Doctests (los ejemplos de la documentación deben compilar)
        run: cargo test --workspace --doc
      - name: Tests (slh feature, release — SLH-DSA signing is slow in debug)
        run: cargo test --features slh --release
      - name: Clippy (slh feature, deny warnings)
        run: cargo clippy --features slh --all-targets --release -- -D warnings
      - name: Tests (honey feature — decoy encryption)
        run: cargo test --features honey --all-targets
      - name: Test (escrow)
        run: cargo test --features escrow --all-targets
      - name: Clippy (honey feature, deny warnings)
        run: cargo clippy --features honey --all-targets -- -D warnings
      - name: Clippy (escrow)
        run: cargo clippy --features escrow --all-targets -- -D warnings
      # El camino de ERROR de las autopruebas es el único que nunca se ejecuta en
      # un build normal, y es el que tiene que funcionar el día que haga falta.
      - name: Tests (autopruebas — camino de fallo, inyección)
        run: cargo test --features selftest-fault --lib selftest
      # Simulación en volumen y concurrencia: 200 pasadas + 100 hebras + 1000
      # llamadas repetidas. Un interbloqueo sale como fallo, no como cuelgue.
      - name: Simulación de autopruebas (1300 operaciones)
        run: cargo run --release --example selftest_soak

  audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  security-lab:
    name: security lab (feature-gated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Isolation — el arma no viaja en el build por defecto
        run: |
          # Ningún módulo NO-lab debe referenciar crate::lab.
          if grep -rn "crate::lab" src --include='*.rs' | grep -v '^src/lab/' | grep -v 'cfg(feature = "lab")'; then
            echo "FALLO: referencia a crate::lab fuera del laboratorio" && exit 1
          fi
          # El build por defecto (el que se publica) no debe compilar el laboratorio.
          cargo build
      - name: Lab tests
        run: cargo test --features lab --lib lab
      - name: Lab tests (streaming forgery)
        run: cargo test --features lab stream_attack
      - name: Lab example
        run: cargo run --example securitylab --features lab
      - name: Clippy (lab, deny warnings)
        run: cargo clippy --features lab --all-targets -- -D warnings
      - name: Lab tests (triple-hybrid forgery, release)
        run: cargo test --features "lab slh" --release forge_triple
      - name: Lab tests (honey success-oracle)
        run: cargo test --features "lab honey" honey_attack
      - name: Lab tests (honey parser fuzz)
        run: cargo test --features "lab honey" honey_fuzz
      - name: Red-team (all surfaces consolidated)
        run: cargo run --example redteam --features "lab slh honey" --release

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM (JSON)
        run: cargo cyclonedx --format json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            *.cdx.json
            bom.json
          if-no-files-found: error

  vet:
    name: cargo-vet (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-vet
        run: cargo install cargo-vet --locked
      - name: Vet dependencies
        run: cargo vet --locked

  # Cada feature declarada, compilada por separado, más todas juntas.
  #
  # Existe porque el 2026-07-21 se descubrió que `lab-offline` llevaba sin
  # compilar desde 0.9.0 — y no solo en el repositorio: el `.crate` publicado en
  # crates.io tampoco compilaba. Nadie lo vio porque el job `test + clippy`
  # prueba las features de una en una pero NUNCA `lab-offline` ni todas juntas.
  #
  # La lista se DERIVA de Cargo.toml, no se escribe a mano. Una lista repetida
  # es una lista que diverge: fue exactamente así como la rueda de PyPI 0.9.0
  # salió sin la feature `hsm`.
  #
  # Solo compila, no prueba: el banco offline tarda demasiado para cada PR, y lo
  # que esta clase de defecto rompe es la compilación.
  features:
    name: matriz de features (compila todas)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Compilar cada feature declarada en Cargo.toml
        run: |
          set -o pipefail
          features=$(python3 -c "
          import tomllib
          with open('Cargo.toml','rb') as f:
              print(' '.join(sorted(tomllib.load(f).get('features', {}))))
          ")
          echo "Features declaradas: $features"
          fallos=0
          for f in $features; do
            echo "::group::--features $f"
            if cargo build --workspace --all-targets --features "$f"; then
              echo "OK: $f"
            else
              echo "::error::la feature '$f' NO compila"
              fallos=$((fallos + 1))
            fi
            echo "::endgroup::"
          done
          echo "::group::--all-features"
          if cargo build --workspace --all-targets --all-features; then
            echo "OK: todas juntas"
          else
            echo "::error::--all-features NO compila"
            fallos=$((fallos + 1))
          fi
          echo "::endgroup::"
          if [ "$fallos" -gt 0 ]; then
            echo "$fallos combinación(es) de features no compilan."
            exit 1
          fi

  fuzz:
    name: fuzz (smoke, nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # Smoke corto por target: garantiza que el harness compila y que ninguna
      # entrada del corpus/seed provoca crash. El fuzzing largo va por cron/local.
      - name: Smoke every fuzz target
        run: |
          for t in honey_decrypt parse_container unpad codec_roundtrip; do
            echo "== fuzz $t =="
            cargo fuzz run "$t" -- -max_total_time=20
          done

  capi:
    name: C ABI (bindings/c)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cbindgen
        run: cargo install cbindgen --locked
      - name: Build cdylib + staticlib
        run: cargo build -p quipu-capi
      - name: Verify quipu.h is up to date
        run: |
          cd bindings/c
          cbindgen --config cbindgen.toml --crate quipu-capi --output /tmp/quipu.gen.h
          diff -u include/quipu.h /tmp/quipu.gen.h
      - name: Rust ABI unit tests
        run: cargo test -p quipu-capi
      - name: Compile and run the C integration test
        run: |
          cc -I bindings/c/include bindings/c/tests/roundtrip.c \
             -L target/debug -lquipu_capi -o /tmp/capi_roundtrip
          LD_LIBRARY_PATH=target/debug /tmp/capi_roundtrip

  node:
    name: Node.js bindings (bindings/node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Build native lib + copy prebuild
        working-directory: bindings/node
        run: node scripts/build-native.mjs
      - name: Install dependencies
        working-directory: bindings/node
        run: npm ci
      - name: Test
        working-directory: bindings/node
        run: npm test

  go:
    name: Go bindings (bindings/go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v7
        with:
          go-version: "1.23"
      - name: Build native staticlib
        run: cargo build -p quipu-capi --release
      - name: Test
        working-directory: bindings/go
        run: CGO_ENABLED=1 go test -v ./...

  hsm:
    name: HSM (PKCS#11 contra kryoptic)
    runs-on: ubuntu-latest
    # kryoptic con ML-DSA exige OpenSSL 3.5; ubuntu-latest trae 3.0. Fedora 43 ya
    # empaqueta kryoptic con la feature `pqc` y el módulo en /usr/lib64/pkcs11.
    container: fedora:43
    steps:
      - uses: actions/checkout@v7
      - name: Instalar kryoptic y el toolchain de Rust
        # kryoptic trae libkryoptic_pkcs11.so; cargo/gcc para compilar quipu.
        # cryptoki carga el .so por dlopen en runtime, así que aquí no hace falta
        # OpenSSL en tiempo de compilación de quipu.
        run: dnf install -y kryoptic cargo gcc
      - name: Prueba del custodio PKCS#11
        # Firma DENTRO del token y verifica con el verificador puro de quipu.
        env:
          QUIPU_PKCS11_MODULE: /usr/lib64/pkcs11/libkryoptic_pkcs11.so
          KRYOPTIC_CONF: ${{ runner.temp }}/kryoptic-token.sql
        # --test-threads=1: C_Initialize del módulo es un singleton del proceso.
        run: cargo test --features hsm --test hsm_pkcs11 -- --test-threads=1
