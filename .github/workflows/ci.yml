name: CI

# Se activa cuando el proyecto pase a git/GitHub. Mientras tanto, el equivalente
# local es `scripts/audit.sh`.
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Auditoría semanal de dependencias aunque no haya cambios (nuevas CVEs).
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --all-targets
      - name: Tests
        run: cargo test --all-targets
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests (slh feature, release — SLH-DSA signing is slow in debug)
        run: cargo test --features slh --release
      - name: Clippy (slh feature, deny warnings)
        run: cargo clippy --features slh --all-targets --release -- -D warnings
      - name: Tests (honey feature — decoy encryption)
        run: cargo test --features honey --all-targets
      - name: Test (escrow)
        run: cargo test --features escrow --all-targets
      - name: Clippy (honey feature, deny warnings)
        run: cargo clippy --features honey --all-targets -- -D warnings
      - name: Clippy (escrow)
        run: cargo clippy --features escrow --all-targets -- -D warnings
      # El camino de ERROR de las autopruebas es el único que nunca se ejecuta en
      # un build normal, y es el que tiene que funcionar el día que haga falta.
      - name: Tests (autopruebas — camino de fallo, inyección)
        run: cargo test --features selftest-fault --lib selftest
      # Simulación en volumen y concurrencia: 200 pasadas + 100 hebras + 1000
      # llamadas repetidas. Un interbloqueo sale como fallo, no como cuelgue.
      - name: Simulación de autopruebas (1300 operaciones)
        run: cargo run --release --example selftest_soak

  audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  security-lab:
    name: security lab (feature-gated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Isolation — el arma no viaja en el build por defecto
        run: |
          # Ningún módulo NO-lab debe referenciar crate::lab.
          if grep -rn "crate::lab" src --include='*.rs' | grep -v '^src/lab/' | grep -v 'cfg(feature = "lab")'; then
            echo "FALLO: referencia a crate::lab fuera del laboratorio" && exit 1
          fi
          # El build por defecto (el que se publica) no debe compilar el laboratorio.
          cargo build
      - name: Lab tests
        run: cargo test --features lab --lib lab
      - name: Lab tests (streaming forgery)
        run: cargo test --features lab stream_attack
      - name: Lab example
        run: cargo run --example securitylab --features lab
      - name: Clippy (lab, deny warnings)
        run: cargo clippy --features lab --all-targets -- -D warnings
      - name: Lab tests (triple-hybrid forgery, release)
        run: cargo test --features "lab slh" --release forge_triple
      - name: Lab tests (honey success-oracle)
        run: cargo test --features "lab honey" honey_attack
      - name: Lab tests (honey parser fuzz)
        run: cargo test --features "lab honey" honey_fuzz
      - name: Red-team (all surfaces consolidated)
        run: cargo run --example redteam --features "lab slh honey" --release

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM (JSON)
        run: cargo cyclonedx --format json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            *.cdx.json
            bom.json
          if-no-files-found: error

  vet:
    name: cargo-vet (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-vet
        run: cargo install cargo-vet --locked
      - name: Vet dependencies
        run: cargo vet --locked

  fuzz:
    name: fuzz (smoke, nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # Smoke corto por target: garantiza que el harness compila y que ninguna
      # entrada del corpus/seed provoca crash. El fuzzing largo va por cron/local.
      - name: Smoke every fuzz target
        run: |
          for t in honey_decrypt parse_container unpad codec_roundtrip; do
            echo "== fuzz $t =="
            cargo fuzz run "$t" -- -max_total_time=20
          done

  capi:
    name: C ABI (bindings/c)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cbindgen
        run: cargo install cbindgen --locked
      - name: Build cdylib + staticlib
        run: cargo build -p quipu-capi
      - name: Verify quipu.h is up to date
        run: |
          cd bindings/c
          cbindgen --config cbindgen.toml --crate quipu-capi --output /tmp/quipu.gen.h
          diff -u include/quipu.h /tmp/quipu.gen.h
      - name: Rust ABI unit tests
        run: cargo test -p quipu-capi
      - name: Compile and run the C integration test
        run: |
          cc -I bindings/c/include bindings/c/tests/roundtrip.c \
             -L target/debug -lquipu_capi -o /tmp/capi_roundtrip
          LD_LIBRARY_PATH=target/debug /tmp/capi_roundtrip

  node:
    name: Node.js bindings (bindings/node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build native lib + copy prebuild
        working-directory: bindings/node
        run: node scripts/build-native.mjs
      - name: Install dependencies
        working-directory: bindings/node
        run: npm ci
      - name: Test
        working-directory: bindings/node
        run: npm test

  go:
    name: Go bindings (bindings/go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - name: Build native staticlib
        run: cargo build -p quipu-capi --release
      - name: Test
        working-directory: bindings/go
        run: CGO_ENABLED=1 go test -v ./...
