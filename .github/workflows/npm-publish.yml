name: npm-publish

# Publishes the Node.js bindings (`quipu-crypto`) to npm on a `v*` tag. The
# package ships prebuilt native libraries (libquipu_capi) per platform under
# bindings/node/prebuilds/<platform>-<arch>/, so end users need no Rust toolchain.
# Auth is npm Trusted Publishing (OIDC) — no token; configured on npmjs.com.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prebuild:
    name: prebuild-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: linux-x64 }
          - { os: macos-13,       target: darwin-x64 }
          - { os: macos-latest,   target: darwin-arm64 }
          - { os: windows-latest, target: win32-x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build native lib + copy into prebuilds/
        working-directory: bindings/node
        run: node scripts/build-native.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.target }}
          path: bindings/node/prebuilds/
          if-no-files-found: error

  publish:
    name: publish to npm
    needs: [prebuild]
    runs-on: ubuntu-latest
    # Run on a `v*` tag push OR a manual dispatch. NOTE: on workflow_dispatch
    # github.ref is `refs/heads/main`, so it must be matched explicitly here or
    # the job is skipped entirely.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    # Auth is npm Trusted Publishing (OIDC) — no NPM_TOKEN. The trust is
    # configured on npmjs.com (package `quipu-crypto` → trusted publisher: this
    # repo, workflow file `npm-publish.yml`, environment `npm`). The `npm`
    # environment is the gate: restrict who/what can publish in repo settings.
    environment: npm
    permissions:
      id-token: write   # OIDC token for trusted publishing + provenance
      contents: read    # actions/checkout
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing needs npm >= 11.5.1; the runner's bundled npm is older.
      - name: Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      # Collect every platform's prebuild into bindings/node/prebuilds/.
      - uses: actions/download-artifact@v4
        with:
          path: bindings/node/prebuilds
          pattern: prebuild-*
          merge-multiple: true
      - name: List bundled prebuilds
        working-directory: bindings/node
        run: find prebuilds -type f
      # OIDC handles auth; provenance is attested automatically under trusted
      # publishing (kept explicit for clarity). No token env needed.
      - name: Publish (OIDC trusted publishing, public, with provenance)
        working-directory: bindings/node
        run: npm publish --provenance --access public
