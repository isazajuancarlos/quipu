name: npm-publish

# Publishes the Node.js bindings (`quipu-crypto`) to npm on a `v*` tag. The
# package ships prebuilt native libraries (libquipu_capi) per platform under
# bindings/node/prebuilds/<platform>-<arch>/, so end users need no Rust toolchain.
# Requires an `NPM_TOKEN` automation token in the repo's `npm` environment.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prebuild:
    name: prebuild-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: linux-x64 }
          - { os: macos-13,       target: darwin-x64 }
          - { os: macos-latest,   target: darwin-arm64 }
          - { os: windows-latest, target: win32-x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build native lib + copy into prebuilds/
        working-directory: bindings/node
        run: node scripts/build-native.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.target }}
          path: bindings/node/prebuilds/
          if-no-files-found: error

  publish:
    name: publish to npm
    needs: [prebuild]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write   # npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      # Collect every platform's prebuild into bindings/node/prebuilds/.
      - uses: actions/download-artifact@v4
        with:
          path: bindings/node/prebuilds
          pattern: prebuild-*
          merge-multiple: true
      - name: List bundled prebuilds
        working-directory: bindings/node
        run: find prebuilds -type f
      # Publishes only if an NPM_TOKEN secret is configured; otherwise skips with a
      # warning so a first release (before the token exists) stays green. Re-run
      # this workflow (workflow_dispatch) once the secret is added to publish.
      - name: Publish (public, with provenance)
        working-directory: bindings/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::warning::NPM_TOKEN not set — skipping npm publish. Add an NPM_TOKEN secret and re-run this workflow to publish quipu-crypto."
            exit 0
          fi
          npm publish --provenance --access public
