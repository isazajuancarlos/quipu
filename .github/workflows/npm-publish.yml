name: npm-publish

# Publishes the Node.js bindings (`quipu-crypto`) to npm on a `v*` tag. The
# package ships prebuilt native libraries (libquipu_capi) per platform under
# bindings/node/prebuilds/<platform>-<arch>/, so end users need no Rust toolchain.
# Auth is npm Trusted Publishing (OIDC) — no token; configured on npmjs.com.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prebuild:
    name: prebuild-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: linux-x64 }
          # darwin-x64 is cross-compiled on the arm64 runner (Xcode's clang is a
          # universal linker) — Intel macOS runners are scarce and stall in queue.
          - { os: macos-latest,   target: darwin-x64, rust_target: x86_64-apple-darwin, node_arch: x64 }
          - { os: macos-latest,   target: darwin-arm64 }
          - { os: windows-latest, target: win32-x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build native lib + copy into prebuilds/
        working-directory: bindings/node
        run: >-
          node scripts/build-native.mjs
          ${{ matrix.rust_target && format('--target {0} --arch {1}', matrix.rust_target, matrix.node_arch) || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.target }}
          path: bindings/node/prebuilds/
          if-no-files-found: error

  publish:
    name: publish to npm
    needs: [prebuild]
    runs-on: ubuntu-latest
    # Run on a `v*` tag push OR a manual dispatch. NOTE: on workflow_dispatch
    # github.ref is `refs/heads/main`, so it must be matched explicitly here or
    # the job is skipped entirely.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    # Auth is hybrid: prefer npm Trusted Publishing (OIDC, no token) once the
    # package exists; but npm OIDC CANNOT create a brand-new package (npm/cli
    # #8544), so the very first publish needs a one-shot `NPM_TOKEN` secret.
    # After `quipu-crypto` exists on npm, delete the token and every future
    # release goes token-free over OIDC. Trust is configured on npmjs.com
    # (package `quipu-crypto` → this repo, workflow `npm-publish.yml`, env `npm`).
    # The `npm` environment is the gate: restrict who/what can publish.
    environment: npm
    permissions:
      id-token: write   # OIDC token for trusted publishing + provenance
      contents: read    # actions/checkout
    steps:
      - uses: actions/checkout@v4
      # Node 24: older Node/npm ship OIDC handshake support the registry rejects.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Trusted publishing needs npm >= 11.5.1; the runner's bundled npm is older.
      - name: Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      # Collect every platform's prebuild into bindings/node/prebuilds/.
      - uses: actions/download-artifact@v4
        with:
          path: bindings/node/prebuilds
          pattern: prebuild-*
          merge-multiple: true
      - name: List bundled prebuilds
        working-directory: bindings/node
        run: find prebuilds -type f
      # If NPM_TOKEN is set (bootstrap / first publish), authenticate with it;
      # otherwise leave auth to OIDC. We write ~/.npmrc only for the token path so
      # an empty token never forces an anonymous (401→misleading 404) handshake.
      # Provenance is attested in both paths.
      - name: Publish (public, with provenance)
        working-directory: bindings/node
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
            echo "Auth: NPM_TOKEN (bootstrap / first publish)."
          else
            echo "Auth: OIDC trusted publishing (no token)."
          fi
          npm publish --provenance --access public
