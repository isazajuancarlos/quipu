name: release-wheels

# Construye ruedas Python (abi3, una por plataforma sirve para CPython 3.9+) y el
# sdist. En un tag además publica en PyPI. También ejecutable a mano.
#
# DOS paquetes, DOS cadencias, DOS patrones de tag:
#
#   v*        -> quipu-crypto       (el núcleo, AGPL, pyproject.toml de la raíz)
#   voprf-v*  -> quipu-voprf        (Apache-2.0, crates/quipu-voprf)
#   django-v* -> quipu-oprf-django  (Apache-2.0, integrations/django)
#
# Van por separado a propósito. `quipu-voprf` se versiona solo: publicar sus
# primitivas no debe obligar a sacar una versión del núcleo, ni al revés. Además
# un tag `v*` reconstruiría la versión que diga el pyproject de la raíz, que hoy
# es una ya publicada — arrastrar eso solo para sacar otro paquete es pedir un
# accidente. Los patrones son disjuntos: `refs/tags/voprf-v0.1.0` NO empieza por
# `refs/tags/v`, así que cada tag dispara solo lo suyo.
on:
  push:
    tags: ["v*", "voprf-v*", "django-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheels-${{ matrix.os }}
    if: ${{ !startsWith(github.ref, 'refs/tags/voprf-v') && !startsWith(github.ref, 'refs/tags/django-v') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels (maturin, feature python)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features python --out dist
          sccache: "true"
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  sdist:
    name: sdist
    if: ${{ !startsWith(github.ref, 'refs/tags/voprf-v') && !startsWith(github.ref, 'refs/tags/django-v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish:
    name: publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    # Solo publica al hacer un tag v*.
    # OJO: 'refs/tags/voprf-v*' TAMBIEN empieza por 'refs/tags/v' ("voprf"
    # empieza por "v"). Sin excluirlo, un tag de quipu-voprf dispararia el
    # release del nucleo. Hoy se salvaria porque sus `needs` no corren, pero
    # eso es suerte, no diseno.
    if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/voprf-v') && !startsWith(github.ref, 'refs/tags/django-v')
    environment: pypi
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC), sin token en secretos
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      # Acción oficial de PyPA: soporta trusted publishing (OIDC) de forma nativa,
      # sin necesidad de token. Sube todo lo que haya en dist/ (ruedas + sdist).
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # --- quipu-voprf (Apache-2.0) -----------------------------------------------
  # Paquete aparte, tag aparte (voprf-v*). Es lo UNICO que un cliente del
  # servicio OPRF instala en su servidor de auth: no puede arrastrar la AGPL del
  # nucleo, y por eso vive en su propio crate y su propia rueda. Ver LICENSING.md §0.

  voprf-wheels:
    name: voprf-wheels-${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/voprf-v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      # `manylinux: auto` construye en contenedor contra una glibc vieja. Sin
      # esto, la rueda sale atada a la glibc del runner y deja fuera a medio
      # mundo -- y en PyPI una version no se puede re-subir, solo retirar.
      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features python --out dist -m crates/quipu-voprf/Cargo.toml
          sccache: "true"
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: voprf-wheels-${{ matrix.os }}
          path: dist

  voprf-sdist:
    name: voprf-sdist
    if: startsWith(github.ref, 'refs/tags/voprf-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m crates/quipu-voprf/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: voprf-sdist
          path: dist

  publish-voprf:
    name: publish quipu-voprf to PyPI
    needs: [voprf-wheels, voprf-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/voprf-v')
    environment: pypi
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC), sin token en secretos
    steps:
      # `pattern` y merge-multiple: solo los artefactos de voprf. Sin el patron
      # se colarian los del nucleo si algun dia coincidieran en la misma run.
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: voprf-*
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # --- quipu-oprf-django (Apache-2.0) ------------------------------------------
  # Python PURO (setuptools), no maturin: no hay Rust que compilar, asi que ni
  # ruedas por plataforma ni matriz. Una rueda universal y el sdist.

  django-dist:
    name: django-dist
    if: startsWith(github.ref, 'refs/tags/django-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheel + sdist
        working-directory: integrations/django
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist
      - uses: actions/upload-artifact@v4
        with:
          name: django-dist
          path: integrations/django/dist

  publish-django:
    name: publish quipu-oprf-django to PyPI
    needs: [django-dist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/django-v')
    environment: pypi
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC), sin token en secretos
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: django-*
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  sign:
    name: sign artifacts (sigstore) + GitHub Release
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    # OJO: 'refs/tags/voprf-v*' TAMBIEN empieza por 'refs/tags/v' ("voprf"
    # empieza por "v"). Sin excluirlo, un tag de quipu-voprf dispararia el
    # release del nucleo. Hoy se salvaria porque sus `needs` no corren, pero
    # eso es suerte, no diseno.
    if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/voprf-v') && !startsWith(github.ref, 'refs/tags/django-v')
    permissions:
      id-token: write   # cosign keyless (OIDC), sin claves en secretos
      contents: write   # crear el GitHub Release y adjuntar artefactos + firmas
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign each artifact (keyless)
        run: |
          for f in dist/*; do
            cosign sign-blob --yes --bundle "${f}.sigstore" "${f}"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: signatures
          path: dist/*.sigstore
          if-no-files-found: error
      # Publica un GitHub Release con las ruedas/sdist Y sus bundles .sigstore,
      # para que cualquiera pueda `cosign verify-blob --bundle` según docs/RELEASES.md.
      - name: Create GitHub Release with signed artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sigstore
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Artefactos firmados con sigstore/cosign (keyless, OIDC).
            Verificación: ver [`docs/RELEASES.md`](https://github.com/isazajuancarlos/quipu/blob/main/docs/RELEASES.md)
            (attestations PEP 740 en PyPI + `cosign verify-blob --bundle` para cada `.sigstore`).
